<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>GEMS-RAG</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app" class="page" data-loading="true">
      <header class="page-header">
        <div>
          <p class="brand">GEMS-RAG</p>
          <h1>Model setup</h1>
        </div>
        <span id="page-status" class="page-status" role="status">Loading...</span>
      </header>

      <main>
        <section class="panel" aria-labelledby="models-heading">
          <div class="section-header">
            <div>
              <h2 id="models-heading">Models</h2>
              <p><span id="model-count">0 models</span> / <span id="selected-count">0 selected</span></p>
            </div>
            <div class="small-actions">
              <button id="select-all-models" class="text-button" type="button">Select all</button>
              <button id="clear-models" class="text-button" type="button">Clear</button>
            </div>
          </div>
          <div id="model-list" class="model-list" aria-live="polite">
            <p class="loading-copy">Loading models...</p>
          </div>
        </section>

        <section class="panel" aria-labelledby="tokens-heading">
          <div class="section-header">
            <div>
              <h2 id="tokens-heading">API tokens</h2>
              <p id="token-summary">Checking saved tokens...</p>
            </div>
            <span class="local-note"><code>.env</code> (local)</span>
          </div>

          <form id="token-form">
            <div id="token-list" class="token-list" aria-live="polite"></div>
            <div class="form-footer">
              <button id="save-tokens" class="primary-button" type="submit">Save entered tokens</button>
            </div>
          </form>
        </section>
      </main>

      <p id="message" class="message" aria-live="polite"></p>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
